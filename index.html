<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易占 AI · 辅助决策</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #faf8f5;
            --bg-secondary: #f5f0e8;
            --text-primary: #2c2c2c;
            --text-secondary: #5a5a5a;
            --accent-gold: #c4a35a;
            --accent-dark: #8b7355;
            --bagua-yang: #1a1a1a;
            --bagua-yin: #f0ebe3;
            --border-color: #d4c9b8;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 水墨渐变背景 */
        .ink-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(196, 163, 90, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 115, 85, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(245, 240, 232, 0.8) 0%, transparent 70%),
                linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* 头部 */
        header {
            text-align: center;
            padding: 40px 0 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .taiji-symbol {
            width: 48px;
            height: 48px;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 4px;
        }

        /* 卡片通用样式 */
        .card {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 24px rgba(139, 115, 85, 0.08);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 8px 32px rgba(139, 115, 85, 0.12);
        }

        .card-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            color: var(--accent-dark);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--accent-gold) 0%, var(--accent-dark) 100%);
            border-radius: 2px;
        }

        /* 问题输入区 */
        .question-area {
            position: relative;
        }

        .question-input {
            width: 100%;
            min-height: 100px;
            padding: 18px;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text-primary);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        .question-input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(196, 163, 90, 0.15);
        }

        .question-input::placeholder {
            color: #a0a0a0;
        }

        /* 掷卦区 */
        .casting-area {
            text-align: center;
        }

        .coins-container {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 24px 0;
        }

        .coin-wrapper {
            perspective: 1000px;
        }

        .coin {
            width: 72px;
            height: 72px;
            position: relative;
            transform-style: preserve-3d;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .coin.flipping {
            animation: coinFlip 0.8s ease-out;
        }

        @keyframes coinFlip {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(900deg); }
            100% { transform: rotateY(1800deg); }
        }

        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            backface-visibility: hidden;
            box-shadow: 
                inset 0 2px 4px rgba(255,255,255,0.3),
                inset 0 -2px 4px rgba(0,0,0,0.2),
                0 4px 12px rgba(0,0,0,0.15);
        }

        .coin-front {
            background: linear-gradient(145deg, #d4af37 0%, #b8962e 50%, #a07d28 100%);
            color: #fff;
        }

        .coin-back {
            background: linear-gradient(145deg, #c9c9c9 0%, #a8a8a8 50%, #8e8e8e 100%);
            color: #666;
            transform: rotateY(180deg);
        }

        .progress-indicator {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 16px 0;
        }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }

        .progress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .progress-dot.active {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            transform: scale(1.2);
        }

        .progress-dot.yang {
            background: var(--bagua-yang);
            border-color: var(--bagua-yang);
        }

        .progress-dot.yin {
            background: var(--bagua-yin);
            border-color: var(--border-color);
        }

        .btn-cast {
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-dark) 100%);
            color: #fff;
            border: none;
            padding: 14px 48px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(196, 163, 90, 0.3);
            margin-top: 16px;
        }

        .btn-cast:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(196, 163, 90, 0.4);
        }

        .btn-cast:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 爻象显示区 */
        .yao-display {
            margin: 24px 0;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
            min-height: 140px;
        }

        .yao-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 12px 0;
            opacity: 0;
            transform: translateX(-20px);
            animation: slideIn 0.4s ease forwards;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .yao-symbol {
            font-size: 2rem;
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 4px;
        }

        .yao-number {
            font-size: 0.85rem;
            color: var(--text-secondary);
            min-width: 50px;
        }

        .yao-line {
            width: 60px;
            height: 6px;
            border-radius: 3px;
        }

        .yao-line.yang {
            background: var(--bagua-yang);
        }

        .yao-line.yin {
            background: transparent;
            border: 2px solid var(--bagua-yang);
            height: 6px;
            position: relative;
        }

        .yao-line.yin::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 2px;
            background: var(--bagua-yang);
        }

        /* 卦象结果 */
        .gua-result {
            margin-top: 24px;
            padding: 24px;
            background: linear-gradient(135deg, rgba(196, 163, 90, 0.1) 0%, rgba(139, 115, 85, 0.1) 100%);
            border-radius: 12px;
            border: 1px solid rgba(196, 163, 90, 0.3);
        }

        .gua-name {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }

        .gua-meaning {
            text-align: center;
            color: var(--accent-dark);
            font-size: 1rem;
            margin-bottom: 16px;
        }

        .gua-ci {
            font-family: 'Noto Serif SC', serif;
            font-size: 0.95rem;
            line-height: 1.8;
            text-align: center;
            color: var(--text-secondary);
            padding: 16px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .gua-symbols {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 20px 0;
        }

        .gua-symbol-item {
            text-align: center;
        }

        .gua-symbol-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .gua-symbol-value {
            font-size: 2.5rem;
            letter-spacing: 8px;
        }

        /* AI分析区 */
        .ai-analysis {
            text-align: center;
        }

        .btn-ai {
            background: linear-gradient(135deg, #4a4a4a 0%, #2c2c2c 100%);
            color: #fff;
            border: none;
            padding: 14px 40px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(44, 44, 44, 0.3);
        }

        .btn-ai:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(44, 44, 44, 0.4);
        }

        .btn-ai:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-reset {
            background: transparent;
            color: var(--accent-dark);
            border: 1px solid var(--accent-dark);
            padding: 12px 32px;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.95rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-reset:hover {
            background: var(--accent-dark);
            color: #fff;
        }

        .ai-loading {
            display: none;
            margin-top: 24px;
        }

        .ai-loading.active {
            display: block;
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .loading-dot {
            width: 10px;
            height: 10px;
            background: var(--accent-gold);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .ai-result {
            display: none;
            margin-top: 24px;
            text-align: left;
            padding: 24px;
            background: linear-gradient(135deg, rgba(74, 74, 74, 0.05) 0%, rgba(44, 44, 44, 0.08) 100%);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .ai-result.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-result h4 {
            font-family: 'Noto Serif SC', serif;
            color: var(--accent-dark);
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .ai-result p {
            line-height: 1.9;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* 底部装饰 */
        .footer-decoration {
            text-align: center;
            padding: 40px 0 20px;
            opacity: 0.6;
        }

        .footer-decoration svg {
            width: 60px;
            height: 60px;
        }

        /* 隐藏状态 */
        .hidden {
            display: none !important;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .container {
                padding: 12px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .card {
                padding: 20px;
                border-radius: 12px;
            }

            .coin {
                width: 60px;
                height: 60px;
            }

            .coins-container {
                gap: 16px;
            }

            .gua-symbols {
                flex-direction: column;
                gap: 16px;
            }

            .btn-cast, .btn-ai {
                padding: 12px 32px;
                font-size: 1rem;
            }
        }

        /* 变爻提示 */
        .bian-yao-hint {
            text-align: center;
            padding: 12px;
            background: rgba(196, 163, 90, 0.1);
            border-radius: 8px;
            margin: 16px 0;
            font-size: 0.9rem;
            color: var(--accent-dark);
        }
    </style>
</head>
<body>
    <div class="ink-bg"></div>
    
    <div class="container">
        <!-- 头部 -->
        <header>
            <div class="logo">
                <svg class="taiji-symbol" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="48" fill="none" stroke="#2c2c2c" stroke-width="2"/>
                    <path d="M50 2 A48 48 0 0 1 50 98 A24 24 0 0 1 50 50 A24 24 0 0 0 50 2" fill="#2c2c2c"/>
                    <circle cx="50" cy="26" r="6" fill="#2c2c2c"/>
                    <circle cx="50" cy="74" r="6" fill="#fff"/>
                </svg>
                <h1>易占 AI</h1>
            </div>
            <p class="subtitle">辅助决策 · 洞察先机</p>
        </header>

        <!-- 问题输入区 -->
        <div class="card question-area">
            <div class="card-title">心有所惑</div>
            <textarea class="question-input" id="questionInput" placeholder="请输入您想咨询的决策问题&#10;例如：我该跳槽吗？该选A公司还是B公司？&#10;亦或是：这段感情该如何抉择？"></textarea>
        </div>

        <!-- 掷卦互动区 -->
        <div class="card casting-area">
            <div class="card-title">投石问路</div>
            
            <div class="coins-container" id="coinsContainer">
                <div class="coin-wrapper">
                    <div class="coin" id="coin1">
                        <div class="coin-face coin-front">☰</div>
                        <div class="coin-face coin-back">☷</div>
                    </div>
                </div>
                <div class="coin-wrapper">
                    <div class="coin" id="coin2">
                        <div class="coin-face coin-front">☰</div>
                        <div class="coin-face coin-back">☷</div>
                    </div>
                </div>
                <div class="coin-wrapper">
                    <div class="coin" id="coin3">
                        <div class="coin-face coin-front">☰</div>
                        <div class="coin-face coin-back">☷</div>
                    </div>
                </div>
            </div>

            <div class="progress-indicator">
                <span id="progressText">尚未起卦</span>
            </div>
            <div class="progress-dots" id="progressDots">
                <div class="progress-dot" data-index="0"></div>
                <div class="progress-dot" data-index="1"></div>
                <div class="progress-dot" data-index="2"></div>
                <div class="progress-dot" data-index="3"></div>
                <div class="progress-dot" data-index="4"></div>
                <div class="progress-dot" data-index="5"></div>
            </div>

            <button class="btn-cast" id="btnCast">掷铜钱</button>
        </div>

        <!-- 爻象显示区 -->
        <div class="card hidden" id="yaoDisplay">
            <div class="card-title">卦象初现</div>
            <div class="yao-display" id="yaoDisplayInner"></div>
        </div>

        <!-- 卦象结果 -->
        <div class="card hidden" id="guaResult">
            <div class="card-title">卦辞详解</div>
            <div class="gua-result">
                <div class="gua-name" id="guaName"></div>
                <div class="gua-meaning" id="guaMeaning"></div>
                <div class="gua-ci" id="guaCi"></div>
                
                <div class="gua-symbols">
                    <div class="gua-symbol-item">
                        <div class="gua-symbol-label">本卦</div>
                        <div class="gua-symbol-value" id="benGuaSymbol"></div>
                    </div>
                    <div class="gua-symbol-item">
                        <div class="gua-symbol-label">变卦</div>
                        <div class="gua-symbol-value" id="bianGuaSymbol"></div>
                    </div>
                </div>

                <div class="bian-yao-hint" id="bianYaoHint"></div>
            </div>
        </div>

        <!-- AI分析区 -->
        <div class="card ai-analysis hidden" id="aiSection">
            <div class="card-title">AI智慧解读</div>
            <button class="btn-ai" id="btnAI">✨ AI分析解读</button>
            
            <div class="ai-loading" id="aiLoading">
                <div class="loading-dots">
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                </div>
                <p>易道玄机，正在解读...</p>
            </div>

            <div class="ai-result" id="aiResult">
                <h4>📜 AI分析</h4>
                <p id="aiResultText"></p>
            </div>

            <button class="btn-reset" id="btnReset">🔄 重新占卜</button>
        </div>

        <!-- 底部装饰 -->
        <div class="footer-decoration">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#d4c9b8" stroke-width="1"/>
                <circle cx="50" cy="50" r="35" fill="none" stroke="#d4c9b8" stroke-width="1"/>
                <circle cx="50" cy="50" r="25" fill="none" stroke="#d4c9b8" stroke-width="1"/>
                <circle cx="50" cy="50" r="15" fill="none" stroke="#d4c9b8" stroke-width="1"/>
            </svg>
        </div>
    </div>

    <script>
        // 64卦数据库（yao从下到上：yao[0]=初爻, yao[5]=上爻；guaXiang先上卦再下卦）
        const hexagramData = {
            "乾": { name: "乾", meaning: "元亨利贞", guaCi: "天行健，君子以自强不息。", yao: [1,1,1,1,1,1], guaXiang: "☰☰", change: "乾为天", bian: "乾" },
            "坤": { name: "坤", meaning: "元亨，利牝马之贞", guaCi: "地势坤，君子以厚德载物。", yao: [0,0,0,0,0,0], guaXiang: "☷☷", change: "坤为地", bian: "坤" },
            "屯": { name: "屯", meaning: "元亨利贞，勿用有攸往", guaCi: "云雷屯，君子以经纶。", yao: [1,0,0,0,1,0], guaXiang: "☵☳", change: "水雷屯", bian: "屯" },
            "蒙": { name: "蒙", meaning: "亨。匪我求童蒙，童蒙求我", guaCi: "山下出泉，蒙；君子以果行育德。", yao: [0,1,0,0,0,1], guaXiang: "☶☵", change: "山水蒙", bian: "蒙" },
            "需": { name: "需", meaning: "有孚，光亨，贞吉", guaCi: "云上于天，需；君子以饮食宴乐。", yao: [1,1,1,0,1,0], guaXiang: "☵☰", change: "水天需", bian: "需" },
            "讼": { name: "讼", meaning: "有孚，窒惕，中吉，终凶", guaCi: "天与水违行，讼；君子以作事谋始。", yao: [0,1,0,1,1,1], guaXiang: "☰☵", change: "天水讼", bian: "讼" },
            "师": { name: "师", meaning: "贞，丈人，吉无咎", guaCi: "地中有水，师；君子以容民畜众。", yao: [0,1,0,0,0,0], guaXiang: "☷☵", change: "地水师", bian: "师" },
            "比": { name: "比", meaning: "吉。原筮，元永贞，无咎", guaCi: "地上有水，比；先王以建万国，亲诸侯。", yao: [0,0,0,0,1,0], guaXiang: "☵☷", change: "水地比", bian: "比" },
            "小畜": { name: "小畜", meaning: "亨，密云不雨，自我西郊", guaCi: "风行天上，小畜；君子以懿文德。", yao: [1,1,1,0,1,1], guaXiang: "☴☰", change: "风天小畜", bian: "小畜" },

        // 卦象符号映射（value从下到上）
        const trigramSymbols = {
            "☰": { name: "乾", value: [1,1,1] },
            "☱": { name: "兑", value: [1,1,0] },
            "☲": { name: "离", value: [1,0,1] },
            "☳": { name: "震", value: [1,0,0] },
            "☴": { name: "巽", value: [0,1,1] },
            "☵": { name: "坎", value: [0,1,0] },
            "☶": { name: "艮", value: [0,0,1] },
            "☷": { name: "坤", value: [0,0,0] }
        };

        // 状态变量
        let currentYao = [];
        let dynamicFlags = [];  // 记录每爻是否为动爻（老阳/老阴）
        let currentGua = null;
        let isCasting = false;
        let castCount = 0;

        // DOM元素
        const btnCast = document.getElementById('btnCast');
        const btnAI = document.getElementById('btnAI');
        const btnReset = document.getElementById('btnReset');
        const questionInput = document.getElementById('questionInput');
        const coinsContainer = document.getElementById('coinsContainer');
        const progressText = document.getElementById('progressText');
        const progressDots = document.querySelectorAll('.progress-dot');
        const yaoDisplay = document.getElementById('yaoDisplay');
        const yaoDisplayInner = document.getElementById('yaoDisplayInner');
        const guaResult = document.getElementById('guaResult');
        const aiSection = document.getElementById('aiSection');
        const aiLoading = document.getElementById('aiLoading');
        const aiResult = document.getElementById('aiResult');
        const aiResultText = document.getElementById('aiResultText');

        // 掷铜钱逻辑
        function castCoins() {
            if (isCasting) return;
            isCasting = true;
            
            const coins = [
                document.getElementById('coin1'),
                document.getElementById('coin2'),
                document.getElementById('coin3')
            ];

            // 重置铜钱
            coins.forEach(coin => {
                coin.classList.remove('flipping');
                coin.style.transform = 'rotateY(0deg)';
            });

            // 触发翻转动画
            setTimeout(() => {
                coins.forEach(coin => coin.classList.add('flipping'));
            }, 50);

            // 计算结果
            setTimeout(() => {
                const results = [];
                for (let i = 0; i < 3; i++) {
                    results.push(Math.random() > 0.5 ? 1 : 0);
                }
                
                // 3正为阳爻，2正1反为阴爻
                const yangCount = results.filter(r => r === 1).length;
                const yaoValue = yangCount >= 2 ? 1 : 0;  // 2阳1阴=少阳, 3阳=老阳, 1阳2阴=少阴, 0阳=老阴
                const isDynamic = (yangCount === 3 || yangCount === 0);  // 老阳或老阴=动爻
                
                // 更新铜钱显示
                coins.forEach((coin, i) => {
                    if (results[i] === 1) {
                        coin.querySelector('.coin-front').textContent = '☰';
                        coin.querySelector('.coin-back').textContent = '☷';
                    } else {
                        coin.querySelector('.coin-front').textContent = '☷';
                        coin.querySelector('.coin-back').textContent = '☰';
                    }
                });

                currentYao.push(yaoValue);
                dynamicFlags.push(isDynamic);
                castCount++;
                
                updateProgress();
                displayYao(yaoValue);
                
                if (castCount < 6) {
                    isCasting = false;
                } else {
                    finishCasting();
                }
            }, 800);
        }

        // 更新进度
        function updateProgress() {
            progressText.textContent = `第 ${castCount} 爻`;
            
            progressDots.forEach((dot, i) => {
                dot.classList.remove('active', 'yang', 'yin');
                if (i < castCount) {
                    dot.classList.add('active');
                    if (currentYao[i] === 1) {
                        dot.classList.add('yang');
                    } else {
                        dot.classList.add('yin');
                    }
                }
            });
        }

        // 显示爻
        function displayYao(yaoValue) {
            yaoDisplay.classList.remove('hidden');
            
            const yaoDiv = document.createElement('div');
            yaoDiv.className = 'yao-row';
            yaoDiv.style.animationDelay = `${(castCount - 1) * 0.15}s`;
            
            const lineClass = yaoValue === 1 ? 'yang' : 'yin';
            const symbol = yaoValue === 1 ? '—' : '— —';
            const chineseNum = ['初', '二', '三', '四', '五', '上'][castCount - 1];
            const isDyn = dynamicFlags[castCount - 1];
            const dynMark = isDyn ? ' ○' : '';  // 动爻标记○
            const yaoType = isDyn ? (yaoValue === 1 ? '老阳' : '老阴') : (yaoValue === 1 ? '少阳' : '少阴');
            
            yaoDiv.innerHTML = `
                <span class="yao-number">${chineseNum}</span>
                <span class="yao-line ${lineClass}" ${isDyn ? 'style="box-shadow:0 0 6px rgba(220,120,40,0.7);"' : ''}></span>
                <span class="yao-symbol">${symbol}${dynMark}</span>
                <span style="font-size:0.7em;color:#c87830;margin-left:4px;">${isDyn ? yaoType : ''}</span>
            `;
            
            yaoDisplayInner.appendChild(yaoDiv);
        }

        // 完成掷卦
        function finishCasting() {
            btnCast.disabled = true;
            progressText.textContent = '卦成';
            
            // 查找对应卦象
            currentGua = findGua(currentYao);
            
            // 兜底：如果数据库里没找到，根据上下卦自动生成
            if (!currentGua) {
                const lowerName = getTrigramNameByYao(currentYao.slice(0, 3));
                const upperName = getTrigramNameByYao(currentYao.slice(3, 6));
                const lowerSymbol = getTrigram(currentYao.slice(0, 3));
                const upperSymbol = getTrigram(currentYao.slice(3, 6));
                currentGua = {
                    name: upperName + lowerName,
                    meaning: '阴阳交变，万象更新',
                    guaCi: upperName + '上' + lowerName + '下，阴阳交错，变化万千，当审时度势而行。',
                    guaXiang: upperSymbol + lowerSymbol
                };
            }
            
            displayGuaResult();
            aiSection.classList.remove('hidden');
        }

        // 根据爻象获取三卦名称
        function getTrigramNameByYao(yao) {
            const key = yao.join('');
            const nameMap = {
                '111': '乾', '110': '兑', '101': '离', '100': '震',
                '011': '巽', '010': '坎', '001': '艮', '000': '坤'
            };
            return nameMap[key] || '未知';
        }

        // 查找卦象
        function findGua(yao) {
            // 遍历64卦查找匹配
            for (const key in hexagramData) {
                const g = hexagramData[key];
                let match = true;
                for (let i = 0; i < 6; i++) {
                    if (g.yao[i] !== yao[i]) {
                        match = false;
                        break;
                    }
                }
                if (match) return g;
            }
            return null;
        }

        // 显示卦结果
        function displayGuaResult() {
            guaResult.classList.remove('hidden');
            
            document.getElementById('guaName').textContent = currentGua.name + '卦';
            document.getElementById('guaMeaning').textContent = currentGua.meaning;
            document.getElementById('guaCi').textContent = '《彖》曰：' + currentGua.guaCi;
            
            // 显示卦象符号
            const lowerTrigram = getTrigram(currentYao.slice(0, 3));
            const upperTrigram = getTrigram(currentYao.slice(3, 6));
            document.getElementById('benGuaSymbol').textContent = upperTrigram + lowerTrigram;
            
            // 变卦（只有动爻变：老阳→阴，老阴→阳）
            const dongPositions = getDongYaoPosition();
            const bianKey = findBianGua();
            if (bianKey !== -1) {
                const bianGua = hexagramData[bianKey];
                document.getElementById('bianGuaSymbol').textContent = bianGua.guaXiang || (upperTrigram + lowerTrigram);
            } else {
                // 无动爻时，变卦=本卦
                document.getElementById('bianGuaSymbol').textContent = upperTrigram + lowerTrigram;
            }
            
            // 显示变爻信息
            document.getElementById('bianYaoHint').textContent = `动爻：${dongPositions}`;
        }

        // 获取三爻卦
        function getTrigram(yao) {
            const key = yao.join('');
            for (const s in trigramSymbols) {
                if (trigramSymbols[s].value.join('') === key) {
                    return s;
                }
            }
            return '☷';
        }

        // 查找变卦（只有动爻才变：老阳变阴、老阴变阳）
        function findBianGua() {
            const bianYao = currentYao.map((y, i) => {
                if (dynamicFlags[i]) {
                    return y === 1 ? 0 : 1;  // 动爻取反
                }
                return y;  // 非动爻不变
            });
            return findGuaIndex(bianYao);
        }

        // 查找卦的索引
        function findGuaIndex(yao) {
            for (const key in hexagramData) {
                const g = hexagramData[key];
                let match = true;
                for (let i = 0; i < 6; i++) {
                    if (g.yao[i] !== yao[i]) {
                        match = false;
                        break;
                    }
                }
                if (match) return key;
            }
            return -1;
        }

        // 获取动爻位置（基于铜钱掷卦时的老阳/老阴）
        function getDongYaoPosition() {
            const positions = [];
            const names = ['初', '二', '三', '四', '五', '上'];
            for (let i = 0; i < 6; i++) {
                if (dynamicFlags[i]) {
                    const type = currentYao[i] === 1 ? '老阳' : '老阴';
                    positions.push(names[i] + '爻(' + type + ')');
                }
            }
            return positions.length > 0 ? positions.join('、') : '无动爻（本卦=变卦）';
        }

        // ============================================
        // 【重要】在这里填入你的通义千问 API Key
        // ============================================
        const API_KEY = 'sk-bf03be237b19431e81a5006d8522a2d1';  // ← 把这里改成你的 Key

        // AI分析
        btnAI.addEventListener('click', async function() {
            btnAI.disabled = true;
            aiLoading.classList.add('active');
            aiResult.classList.remove('active');
            
            try {
                const question = questionInput.value || '事业发展';
                const analysis = await callTongyiAI(question, currentGua);
                
                aiResultText.innerHTML = analysis;
                aiResult.classList.add('active');
            } catch (error) {
                aiResultText.innerHTML = `<b>抱歉，AI分析出错：</b><br>${error.message}<br><br>请检查网络连接或 API Key 是否正确。`;
                aiResult.classList.add('active');
            }
            
            aiLoading.classList.remove('active');
            btnAI.disabled = false;
        });

        // 调用通义千问 API
        async function callTongyiAI(question, gua) {
            const systemPrompt = `你是一位精通周易六十四卦的智者，擅长根据卦象为人们解答困惑、指引方向。
请用温和、智慧、富有哲理的语言回答，格式清晰，包含：
1. 卦象核心含义解读
2. 针对用户问题的具体分析
3. 机遇与风险提示
4. 具体可行的行动建议
回答要通俗易懂，不要过于玄奥，字数控制在300字左右。`;

            const userPrompt = `我的问题是：${question}

我通过掷铜钱得到了【${gua.name}卦】。
卦辞曰："${gua.guaCi}"

请帮我分析这个卦象对我的问题有什么启示？`;

            const response = await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'qwen-turbo',
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userPrompt }
                    ]
                })
            });

            if (!response.ok) {
                throw new Error(`API 请求失败（${response.status}），请检查 API Key 是否正确`);
            }

            const data = await response.json();
            return data.choices[0].message.content.replace(/\n/g, '<br>');
        }

        // 重置
        function reset() {
            currentYao = [];
            dynamicFlags = [];
            currentGua = null;
            isCasting = false;
            castCount = 0;
            
            btnCast.disabled = false;
            progressText.textContent = '尚未起卦';
            
            progressDots.forEach(dot => {
                dot.classList.remove('active', 'yang', 'yin');
            });
            
            yaoDisplay.classList.add('hidden');
            yaoDisplayInner.innerHTML = '';
            guaResult.classList.add('hidden');
            aiSection.classList.add('hidden');
            aiResult.classList.remove('active');
            aiLoading.classList.remove('active');
            questionInput.value = '';  // 清空问题输入框
            btnAI.disabled = false;    // 重置AI按钮状态
        }

        // 事件绑定
        btnCast.addEventListener('click', castCoins);
        btnReset.addEventListener('click', reset);

        // 初始化
        reset();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易占AI·铜钱沙盘</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #faf8f5;
            --bg-secondary: #f5f0e8;
            --text-primary: #2c2c2c;
            --text-secondary: #5a5a5a;
            --accent-gold: #c4a35a;
            --accent-dark: #8b7355;
            --bagua-yang: #1a1a1a;
            --bagua-yin: #f0ebe3;
            --border-color: #d4c9b8;
            --xuan-black: #1a1a1a;
            --chi-gold: #c4a35a;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .ink-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(196, 163, 90, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 115, 85, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(245, 240, 232, 0.8) 0%, transparent 70%),
                linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 40px 0 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .taiji-symbol {
            width: 48px;
            height: 48px;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 4px;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .btn-nav {
            background: transparent;
            color: var(--accent-dark);
            border: 1px solid var(--accent-dark);
            padding: 8px 20px;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.9rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-nav:hover {
            background: var(--accent-dark);
            color: #fff;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 24px rgba(139, 115, 85, 0.08);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 8px 32px rgba(139, 115, 85, 0.12);
        }

        .card-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            color: var(--accent-dark);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--accent-gold) 0%, var(--accent-dark) 100%);
            border-radius: 2px;
        }

        .question-area {
            position: relative;
        }

        .question-input {
            width: 100%;
            min-height: 100px;
            padding: 18px;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text-primary);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        .question-input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(196, 163, 90, 0.15);
        }

        .question-input::placeholder {
            color: #a0a0a0;
        }

        .casting-area {
            text-align: center;
        }

        .coins-container {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 24px 0;
        }

        .coin-wrapper {
            perspective: 1000px;
        }

        .coin {
            width: 72px;
            height: 72px;
            position: relative;
            transform-style: preserve-3d;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .coin.flipping {
            animation: coinFlip 0.8s ease-out;
        }

        @keyframes coinFlip {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(900deg); }
            100% { transform: rotateY(1800deg); }
        }

        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            backface-visibility: hidden;
            box-shadow: 
                inset 0 2px 4px rgba(255,255,255,0.3),
                inset 0 -2px 4px rgba(0,0,0,0.2),
                0 4px 12px rgba(0,0,0,0.15);
        }

        .coin-front {
            background: linear-gradient(145deg, #d4af37 0%, #b8962e 50%, #a07d28 100%);
            color: #fff;
        }

        .coin-back {
            background: linear-gradient(145deg, #c9c9c9 0%, #a8a8a8 50%, #8e8e8e 100%);
            color: #666;
            transform: rotateY(180deg);
        }

        .progress-indicator {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 16px 0;
        }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }

        .progress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .progress-dot.active {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            transform: scale(1.2);
        }

        .progress-dot.yang {
            background: var(--bagua-yang);
            border-color: var(--bagua-yang);
        }

        .progress-dot.yin {
            background: var(--bagua-yin);
            border-color: var(--border-color);
        }

        .btn-cast {
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-dark) 100%);
            color: #fff;
            border: none;
            padding: 14px 48px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(196, 163, 90, 0.3);
            margin-top: 16px;
        }

        .btn-cast:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(196, 163, 90, 0.4);
        }

        .btn-cast:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .yao-display {
            margin: 24px 0;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
            min-height: 140px;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
        }

        .yao-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 8px 0;
            opacity: 0;
            transform: translateX(-20px);
            animation: slideIn 0.4s ease forwards;
            width: 100%;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .yao-type-label {
            font-size: 0.75rem;
            font-family: 'Noto Serif SC', serif;
            color: #c87830;
            min-width: 32px;
            text-align: left;
        }

        .yao-number {
            font-size: 0.85rem;
            color: var(--text-secondary);
            min-width: 24px;
            text-align: right;
            font-family: 'Noto Serif SC', serif;
        }

        .yao-line {
            width: 100px;
            height: 8px;
            border-radius: 2px;
        }

        .yao-line.yang {
            background: var(--bagua-yang);
        }

        .yao-line.yin {
            background: transparent;
            position: relative;
            height: 8px;
        }

        .yao-line.yin::before,
        .yao-line.yin::after {
            content: '';
            position: absolute;
            top: 0;
            height: 100%;
            width: 42%;
            background: var(--bagua-yang);
            border-radius: 2px;
        }

        .yao-line.yin::before { left: 0; }
        .yao-line.yin::after { right: 0; }

        .gua-result {
            margin-top: 24px;
            padding: 24px;
            background: linear-gradient(135deg, rgba(196, 163, 90, 0.1) 0%, rgba(139, 115, 85, 0.1) 100%);
            border-radius: 12px;
            border: 1px solid rgba(196, 163, 90, 0.3);
        }

        .gua-name {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }

        .gua-emoji {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 8px;
        }

        .hexagram-emoji {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        .hexagram-detail-emoji {
            font-size: 3rem;
            text-align: center;
            margin: 10px 0;
        }

        .gua-meaning {
            text-align: center;
            color: var(--accent-dark);
            font-size: 1rem;
            margin-bottom: 16px;
        }

        .gua-ci {
            font-family: 'Noto Serif SC', serif;
            font-size: 0.95rem;
            line-height: 1.8;
            text-align: center;
            color: var(--text-secondary);
            padding: 16px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .gua-symbols {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
        }

        .gua-symbol-item {
            text-align: center;
        }

        .gua-symbol-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-family: 'Noto Serif SC', serif;
        }

        .gua-trigram-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0px;
        }

        .gua-trigram-row {
            font-size: 2rem;
            letter-spacing: 4px;
            line-height: 1.2;
            font-family: 'Noto Serif SC', serif;
        }

        .gua-trigram-divider {
            width: 60%;
            height: 1px;
            background: var(--border-color);
            margin: 2px 0;
        }

        .gua-trigram-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* ========== 功能二：64卦图鉴模态框 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9000;
            display: none;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(180deg, #faf8f5 0%, #f5f0e8 100%);
            border-radius: 20px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            margin: auto;
        }

        .modal-header {
            position: sticky;
            top: 0;
            background: linear-gradient(180deg, #faf8f5 0%, rgba(250, 248, 245, 0.95) 100%);
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .modal-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.5rem;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 20px;
        }

        .modal-search {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .modal-search-input {
            flex: 1;
            max-width: 400px;
            padding: 12px 20px;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            background: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .modal-search-input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(196, 163, 90, 0.15);
        }

        .btn-close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border: none;
            background: var(--bg-secondary);
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-close-modal:hover {
            background: var(--accent-dark);
            color: #fff;
        }

        .modal-body {
            padding: 24px;
        }

        /* 爻线网格布局 - 8列 */
        .hexagram-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
        }

        .hexagram-card {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .hexagram-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 115, 85, 0.15);
            border-color: var(--accent-gold);
        }

        .hexagram-card.hidden {
            display: none;
        }

        .hexagram-card.active {
            border-color: var(--accent-dark);
            background: rgba(196, 163, 90, 0.1);
        }

        .hexagram-num {
            font-size: 9px;
            color: #bbb;
            margin-bottom: 4px;
        }

        /* 爻线样式 - 卡片内 */
        .hexagram-lines {
            display: flex;
            flex-direction: column;
            gap: 2px;
            align-items: center;
            margin-bottom: 6px;
        }

        .hex-line {
            height: 3px;
            border-radius: 1.5px;
        }

        .hex-line.yang {
            width: 28px;
            background: var(--bagua-yang);
        }

        .hex-line.yin {
            width: 28px;
            background: transparent;
            position: relative;
        }

        .hex-line.yin::before,
        .hex-line.yin::after {
            content: '';
            position: absolute;
            top: 0;
            height: 3px;
            border-radius: 1.5px;
            background: var(--bagua-yang);
            width: 11px;
        }

        .hex-line.yin::before { left: 0; }
        .hex-line.yin::after { right: 0; }

        .hexagram-nature-icon {
            font-size: 14px;
            margin-bottom: 2px;
            line-height: 1;
        }

        .hexagram-card-name {
            font-family: 'Noto Serif SC', serif;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .hexagram-card-nature {
            font-size: 9px;
            color: #999;
            margin-top: 1px;
            line-height: 1.2;
        }

        /* 详情区域 */
        .hexagram-detail {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 24px;
            margin-top: 20px;
            border: 1px solid var(--border-color);
        }

        .hexagram-detail.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hexagram-detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .hexagram-detail-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.5rem;
            color: var(--text-primary);
        }

        .btn-back-grid {
            background: transparent;
            border: 1px solid var(--accent-dark);
            color: var(--accent-dark);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn-back-grid:hover {
            background: var(--accent-dark);
            color: #fff;
        }

        /* 详情爻线样式 */
        .hexagram-detail-lines {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
            margin-bottom: 16px;
        }

        .detail-line {
            height: 5px;
            border-radius: 2.5px;
        }

        .detail-line.yang {
            width: 54px;
            background: var(--bagua-yang);
        }

        .detail-line.yin {
            width: 54px;
            background: transparent;
            position: relative;
        }

        .detail-line.yin::before,
        .detail-line.yin::after {
            content: '';
            position: absolute;
            top: 0;
            height: 5px;
            border-radius: 2.5px;
            background: var(--bagua-yang);
            width: 22px;
        }

        .detail-line.yin::before { left: 0; }
        .detail-line.yin::after { right: 0; }

        .hexagram-detail-icon {
            font-size: 36px;
            text-align: center;
            margin-bottom: 12px;
        }

        .hexagram-detail-content {
            margin-top: 16px;
        }

        .hexagram-detail-section {
            margin-bottom: 16px;
        }

        .hexagram-detail-label {
            font-family: 'Noto Serif SC', serif;
            font-size: 0.9rem;
            color: var(--accent-dark);
            margin-bottom: 6px;
        }

        .hexagram-detail-text {
            font-family: 'Noto Serif SC', serif;
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        /* 上下卦信息 */
        .hexagram-trigram-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .hexagram-trigram-box {
            flex: 1;
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 10px 14px;
            text-align: center;
        }

        .hexagram-trigram-label {
            font-size: 10px;
            color: #aaa;
            margin-bottom: 4px;
        }

        .hexagram-trigram-name {
            font-size: 14px;
            color: var(--text-primary);
            font-family: 'Noto Serif SC', serif;
        }

        .hexagram-trigram-nature {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }

        .ai-analysis {
            text-align: center;
        }

        .btn-ai {
            background: linear-gradient(135deg, #4a4a4a 0%, #2c2c2c 100%);
            color: #fff;
            border: none;
            padding: 14px 40px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(44, 44, 44, 0.3);
        }

        .btn-ai:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(44, 44, 44, 0.4);
        }

        .btn-ai:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-reset {
            background: transparent;
            color: var(--accent-dark);
            border: 1px solid var(--accent-dark);
            padding: 12px 32px;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.95rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-reset:hover {
            background: var(--accent-dark);
            color: #fff;
        }

        .ai-loading {
            display: none;
            margin-top: 24px;
        }

        .ai-loading.active {
            display: block;
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .loading-dot {
            width: 10px;
            height: 10px;
            background: var(--accent-gold);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .ai-result {
            display: none;
            margin-top: 24px;
            text-align: left;
            padding: 24px;
            background: linear-gradient(135deg, rgba(74, 74, 74, 0.05) 0%, rgba(44, 44, 44, 0.08) 100%);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .ai-result.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .ai-result h4 {
            font-family: 'Noto Serif SC', serif;
            color: var(--accent-dark);
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .ai-result p {
            line-height: 1.9;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .footer-decoration {

            "无妄": { name: "无妄", meaning: "元亨利贞。其匪正有眚，不利有攸往", guaCi: "天下雷行，物与无妄；先王以茂对时育万物。", yao: [1,0,0,1,1,1], guaXiang: "☰☳", change: "天雷无妄", bian: "无妄", yaoText: ["无妄往，吉","不耕获，不菑畲，则利有攸往","无妄之灾，或系之牛，行人之得","可贞无咎","无妄之疾，勿药有喜","无妄行，有眚，无攸利"], emoji: "🌈", nat: "天下有雷" },

            "家人": { name: "家人", meaning: "利女贞", guaCi: "风自火出，家人；君子以言有物而行有恒。", yao: [1,0,1,0,1,1], guaXiang: "☴☲", change: "风火家人", bian: "家人", yaoText: ["闲有家，悔亡","无攸遂，在中馈，贞吉","家人嗃嗃，悔厉吉，妇子嘻嘻","富家，大吉","王假有家，勿恤吉","有孚威如，终吉"], emoji: "🏠", nat: "风自火出" },

            "损": { name: "损", meaning: "有孚，元吉，无咎，可贞，利有攸往", guaCi: "山下有泽，损；君子以惩忿窒欲。", yao: [1,1,0,0,0,1], guaXiang: "☶☱", change: "山泽损", bian: "损", yaoText: ["已事遄往，无咎，酌损之","利贞，征凶，弗损益之","三人行则损一人，一人行则得其友","损其疾，使遄有喜，无咎","或益之十朋之龟，弗克违，元吉","弗损益之，无咎贞吉，得臣无家"], emoji: "⛰️", nat: "山下有泽" },

            "夬": { name: "夬", meaning: "扬于王庭，孚号，有厉，告自邑，不利即戎", guaCi: "泽上于天，夬；君子以施禄及下，居德则忌。", yao: [1,1,1,1,1,0], guaXiang: "☱☰", change: "泽天夬", bian: "夬", yaoText: ["壮于前趾，往不胜为咎","惕号莫夜，有戎勿恤","壮于頄，有凶，君子夬夬","臀无肤，其行次且，牵羊悔亡","苋陆夬夬，中行无咎","无号，终有凶"], emoji: "🌊", nat: "泽上于天" },

            "升": { name: "升", meaning: "元亨，用见大人，勿恤，南征吉", guaCi: "地中生木，升；君子以顺德，积小以高大。", yao: [0,1,1,0,0,0], guaXiang: "☷☴", change: "地风升", bian: "升", yaoText: ["允升，大吉","孚乃利用禴，无咎","升虚邑","王用亨于岐山，吉无咎","贞吉升阶","冥升，利于不息之贞"], emoji: "🌳", nat: "地中生木" },
            "困": { name: "困", meaning: "亨。贞大人吉，无咎。有言不信", guaCi: "泽无水，困；君子以致命遂志。", yao: [0,1,0,1,1,0], guaXiang: "☱☵", change: "泽水困", bian: "困", yaoText: ["臀困于株木，入于幽谷，三岁不觌","困于酒食，朱绂方来，利用享祀","困于石，据于蒺藜，入于其宫","来徐徐，困于金车，吝有终","劓刖困于赤绂，乃徐有说，利用祭祀","困于葛藟，于臲卼，曰动悔有悔"], emoji: "🏜️", nat: "泽无水" },
            "井": { name: "井", meaning: "改邑不改井，无丧无得，往来井井", guaCi: "木上有水，井；君子以劳民劝相。", yao: [0,1,1,0,1,0], guaXiang: "☵☴", change: "水风井", bian: "井", yaoText: ["井泥不食，旧井无禽","井谷射鲋，瓮敝漏","井渫不食，为我心恻，可用汲","井甃无咎","井冽寒泉食","井收勿幕，有孚元吉"], emoji: "🪾", nat:"木上有水" },

## 严格恪守动爻断卦核心法则
1. **无动爻**：只以**本卦**为唯一判断核心，依托本卦卦辞、卦象、整体卦气判定诸事，不参考变卦。
2. **单一动爻**：以本卦此动爻爻辞为断事核心主旨，可搭配本卦、变卦卦辞卦象辅助佐证，此动爻为当下处境与最终结果的关键枢纽。
3. **两个动爻**：优先参考本卦两处动爻爻辞；若两爻同为阴爻或同为阳爻，**以上方动爻爻辞作为主要论断**，辅以本卦卦辞完善判断。
4. **三个动爻**：必须结合**本卦+变卦**双方卦辞、卦象综合推演事态走向，亦可选取本卦三动爻里居中那一爻的爻辞作为辅助参考。
5. **四至五个动爻**：本卦参考意义大幅降低，**以变卦为主要研判依据**
   - 四动爻：取变卦中两枚静爻爻辞，**以位置偏下的静爻为主断**
   - 五动爻：直接以变卦内唯一一枚静爻的爻辞作为核心定论
6. **六爻全动**
   - 若是乾卦全动取**用九**爻辞论断
   - 若是坤卦全动取**用六**爻辞论断
   - 其余所有卦象六爻全动，统一以**变卦卦辞、卦象**为最终判断依据

## 固定解读结构
1. 逐爻细解：自下而上依次解析初至上六爻，列明原文爻辞、深层义理、人事映射、暗藏利弊
2. 现状格局：客观剖析当下真实处境、内在问题、外部环境，直面不足与隐患
3. 发展趋势：理性推演后续走向，点明顺逆起伏、时机拐点、潜在阻碍与变故
4. 整体吉凶：公允判定全局运势，区分吉中藏凶、凶里含吉、平稳有忧等真实格局，直言凶险不利之处
5. 务实建议：依卦理给出贴合实际的行事方针，宜进宜退、宜守宜争、避险止损尽数据实而言，不空洞虚言吉利。`;

            const yaoTextInfo = gua.yaoText ? gua.yaoText.map((t, i) => {
                const yaoValue = currentYao[i];
                const yaoNum = yaoValue === 1 ? '九' : '六';
                const yaoNames = ['初', '二', '三', '四', '五', '上'];
                const label = i === 0 ? '初' + yaoNum : (i === 5 ? '上' + yaoNum : yaoNum + yaoNames[i]);
                const isDyn = dynamicFlags[i] ? '【动爻】' : '';
                return label + '：' + t + isDyn;
            }).join('\n') : '';

            const userPrompt = `我的问题是：${question}

我通过掷铜钱得到了【${gua.name}卦】。
卦辞曰："${gua.guaCi}"
爻辞如下：
${yaoTextInfo}

请严格按照上述规则为我解卦，据实直言，不回避不利之处。`;

            try {
                const response = await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'qwen-turbo',
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userPrompt }
                        ]
                    })
                });

                if (!response.ok) {
                    throw new Error(`API 请求失败（${response.status}），请检查 API Key 是否正确`);
                }

                const data = await response.json();
                return data.choices[0].message.content.replace(/\n/g, '<br>');
            } catch (error) {
                throw error;
            }
        }

        // 功能二：64卦图鉴
        const hexagramModal = document.getElementById('hexagramModal');
        const hexagramGrid = document.getElementById('hexagramGrid');
        const hexagramDetail = document.getElementById('hexagramDetail');
        const hexagramSearch = document.getElementById('hexagramSearch');
        const btnOpenHexagramGuide = document.getElementById('btnOpenHexagramGuide');
        const btnCloseModal = document.getElementById('btnCloseModal');
        const btnBackGrid = document.getElementById('btnBackGrid');

        // 生成爻线HTML
        function generateLinesHTML(yaoArray) {
            // yao数组从下到上，需要反序渲染（从上到下显示）
            const reversedYao = [...yaoArray].reverse();
            return reversedYao.map(v => `<div class="hex-line ${v === 1 ? 'yang' : 'yin'}"></div>`).join('');
        }

        // 生成详情页爻线HTML
        function generateDetailLinesHTML(yaoArray) {
            const reversedYao = [...yaoArray].reverse();
            return reversedYao.map(v => `<div class="detail-line ${v === 1 ? 'yang' : 'yin'}"></div>`).join('');
        }

        function initHexagramGrid() {
            hexagramGrid.innerHTML = '';
            let idx = 0;
            for (const key in hexagramData) {
                const g = hexagramData[key];
                const card = document.createElement('div');
                card.className = 'hexagram-card';
                card.dataset.name = g.name;
                card.dataset.fullName = g.change || g.name;
                card.dataset.hexagramKey = key;
                card.dataset.idx = idx;
                
                card.innerHTML = `
                    <div class="hexagram-num">${idx + 1}</div>
                    <div class="hexagram-lines">${generateLinesHTML(g.yao)}</div>
                    <div class="hexagram-nature-icon">${g.emoji || ''}</div>
                    <div class="hexagram-card-name">${g.name}</div>
                    <div class="hexagram-card-nature">${g.nat || ''}</div>
                `;
                
                card.addEventListener('click', () => showHexagramDetail(key, idx));
                hexagramGrid.appendChild(card);
                idx++;
            }
        }
        
        hexagramSearch.addEventListener('input', function() {
            const query = this.value.trim().toLowerCase();
            const cards = hexagramGrid.querySelectorAll('.hexagram-card');
            cards.forEach(card => {
                const name = card.dataset.name.toLowerCase();
                const fullName = card.dataset.fullName.toLowerCase();
                if (query === '' || name.includes(query) || fullName.includes(query)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        });
        
        function showHexagramDetail(key, idx) {
            const g = hexagramData[key];
            
            // 更新激活状态
            if (activeHexagramIdx !== null) {
                const prevCard = hexagramGrid.querySelector(`[data-idx="${activeHexagramIdx}"]`);
                if (prevCard) prevCard.classList.remove('active');
            }
            activeHexagramIdx = idx;
            const currentCard = hexagramGrid.querySelector(`[data-idx="${idx}"]`);
            if (currentCard) currentCard.classList.add('active');
            
            document.getElementById('detailTitle').textContent = `${g.name}卦 · ${g.change}`;
            document.getElementById('detailLines').innerHTML = generateDetailLinesHTML(g.yao);
            document.getElementById('detailIcon').textContent = g.emoji || '';
            document.getElementById('detailNat').textContent = g.nat || '';
            document.getElementById('detailMeaning').textContent = g.meaning;
            document.getElementById('detailCi').textContent = g.guaCi;
            
            // 上下卦信息
            const upperKey = g.yao.slice(3, 6).join('');
            const lowerKey = g.yao.slice(0, 3).join('');
            const upperTri = trigrams[upperKey] || { name: '乾', sym: '☰', nature: '天', emoji: '🌌' };
            const lowerTri = trigrams[lowerKey] || { name: '坤', sym: '☷', nature: '地', emoji: '🟫' };
            
            document.getElementById('detailTrigrams').innerHTML = `
                <div class="hexagram-trigram-box">
                    <div class="hexagram-trigram-label">上卦</div>
                    <div class="hexagram-trigram-name">${upperTri.sym} ${upperTri.name}</div>
                    <div class="hexagram-trigram-nature">${upperTri.emoji} ${upperTri.nature}</div>
                </div>
                <div class="hexagram-trigram-box">
                    <div class="hexagram-trigram-label">下卦</div>
                    <div class="hexagram-trigram-name">${lowerTri.sym} ${lowerTri.name}</div>
                    <div class="hexagram-trigram-nature">${lowerTri.emoji} ${lowerTri.nature}</div>
                </div>
            `;
            
            hexagramGrid.style.display = 'none';
            hexagramDetail.classList.add('active');
            hexagramDetail.scrollIntoView({behavior: 'smooth', block: 'start'});
        }
        
        btnBackGrid.addEventListener('click', function() {
            if (activeHexagramIdx !== null) {
                const prevCard = hexagramGrid.querySelector(`[data-idx="${activeHexagramIdx}"]`);
                if (prevCard) prevCard.classList.remove('active');
                activeHexagramIdx = null;
            }
            hexagramDetail.classList.remove('active');
            hexagramGrid.style.display = 'grid';
        });
        
        btnOpenHexagramGuide.addEventListener('click', function() {
            hexagramModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        });
        
        btnCloseModal.addEventListener('click', function() {
            hexagramModal.classList.remove('active');
            document.body.style.overflow = '';
            hexagramDetail.classList.remove('active');
            hexagramGrid.style.display = 'grid';
            hexagramSearch.value = '';
            hexagramGrid.querySelectorAll('.hexagram-card').forEach(c => c.classList.remove('hidden'));
            if (activeHexagramIdx !== null) {
                const prevCard = hexagramGrid.querySelector(`[data-idx="${activeHexagramIdx}"]`);
                if (prevCard) prevCard.classList.remove('active');
                activeHexagramIdx = null;
            }
        });
        
        hexagramModal.addEventListener('click', function(e) {
            if (e.target === hexagramModal) {
                hexagramModal.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        function reset() {
            currentYao = [];
            dynamicFlags = [];
            currentGua = null;
            isCasting = false;
            castCount = 0;
            
            btnCast.disabled = false;
            progressText.textContent = '尚未起卦';
            
            progressDots.forEach(dot => {
                dot.classList.remove('active', 'yang', 'yin');
            });
            
            yaoDisplay.classList.add('hidden');
            yaoDisplayInner.innerHTML = '';
            guaResult.classList.add('hidden');
            document.getElementById('yaoTextList').innerHTML = '';
            aiSection.classList.add('hidden');
            aiResult.classList.remove('active');
            aiLoading.classList.remove('active');
            questionInput.value = '';
            btnAI.disabled = false;
        }

        // 查看详情按钮功能
        const btnViewBenDetail = document.getElementById('btnViewBenDetail');
        const btnViewBianDetail = document.getElementById('btnViewBianDetail');
        
        btnViewBenDetail.addEventListener('click', function() {
            if (currentGua) {
                hexagramModal.classList.add('active');
                document.body.style.overflow = 'hidden';
                for (const key in hexagramData) {
                    if (hexagramData[key].name === currentGua.name) {
                        const card = document.querySelector(`[data-hexagram-key="${key}"]`);
                        const idx = card ? parseInt(card.dataset.idx) : 0;
                        hexagramGrid.style.display = 'grid';
                        hexagramDetail.classList.remove('active');
                        if (card) {
                            card.scrollIntoView({behavior: 'smooth', block: 'center'});
                            setTimeout(() => showHexagramDetail(key, idx), 100);
                        }
                        break;
                    }
                }
            }
        });
        
        btnViewBianDetail.addEventListener('click', function() {
            const bianKey = findBianGua();
            if (bianKey !== -1 && hexagramData[bianKey]) {
                hexagramModal.classList.add('active');
                document.body.style.overflow = 'hidden';
                hexagramGrid.style.display = 'grid';
                hexagramDetail.classList.remove('active');
                const card = document.querySelector(`[data-hexagram-key="${bianKey}"]`);
                const idx = card ? parseInt(card.dataset.idx) : 0;
                if (card) {
                    card.scrollIntoView({behavior: 'smooth', block: 'center'});
                    setTimeout(() => showHexagramDetail(bianKey, idx), 100);
                }
            }
        });

        btnCast.addEventListener('click', castCoins);
        btnReset.addEventListener('click', reset);

        initHexagramGrid();
        reset();
    </script>
</body>
</html>

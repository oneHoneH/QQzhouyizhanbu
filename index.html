<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易占 AI · 辅助决策</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #faf8f5;
            --bg-secondary: #f5f0e8;
            --text-primary: #2c2c2c;
            --text-secondary: #5a5a5a;
            --accent-gold: #c4a35a;
            --accent-dark: #8b7355;
            --bagua-yang: #1a1a1a;
            --bagua-yin: #f0ebe3;
            --border-color: #d4c9b8;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 水墨渐变背景 */
        .ink-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(196, 163, 90, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 115, 85, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(245, 240, 232, 0.8) 0%, transparent 70%),
                linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* 头部 */
        header {
            text-align: center;
            padding: 40px 0 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .taiji-symbol {
            width: 48px;
            height: 48px;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 4px;
        }

        /* 卡片通用样式 */
        .card {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 24px rgba(139, 115, 85, 0.08);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 8px 32px rgba(139, 115, 85, 0.12);
        }

        .card-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            color: var(--accent-dark);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--accent-gold) 0%, var(--accent-dark) 100%);
            border-radius: 2px;
        }

        /* 问题输入区 */
        .question-area {
            position: relative;
        }

        .question-input {
            width: 100%;
            min-height: 100px;
            padding: 18px;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text-primary);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        .question-input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(196, 163, 90, 0.15);
        }

        .question-input::placeholder {
            color: #a0a0a0;
        }

        /* 掷卦区 */
        .casting-area {
            text-align: center;
        }

        .coins-container {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 24px 0;
        }

        .coin-wrapper {
            perspective: 1000px;
        }

        .coin {
            width: 72px;
            height: 72px;
            position: relative;
            transform-style: preserve-3d;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .coin.flipping {
            animation: coinFlip 0.8s ease-out;
        }

        @keyframes coinFlip {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(900deg); }
            100% { transform: rotateY(1800deg); }
        }

        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            backface-visibility: hidden;
            box-shadow: 
                inset 0 2px 4px rgba(255,255,255,0.3),
                inset 0 -2px 4px rgba(0,0,0,0.2),
                0 4px 12px rgba(0,0,0,0.15);
        }

        .coin-front {
            background: linear-gradient(145deg, #d4af37 0%, #b8962e 50%, #a07d28 100%);
            color: #fff;
        }

        .coin-back {
            background: linear-gradient(145deg, #c9c9c9 0%, #a8a8a8 50%, #8e8e8e 100%);
            color: #666;
            transform: rotateY(180deg);
        }

        .progress-indicator {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 16px 0;
        }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }

        .progress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .progress-dot.active {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            transform: scale(1.2);
        }

        .progress-dot.yang {
            background: var(--bagua-yang);
            border-color: var(--bagua-yang);
        }

        .progress-dot.yin {
            background: var(--bagua-yin);
            border-color: var(--border-color);
        }

        .btn-cast {
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-dark) 100%);
            color: #fff;
            border: none;
            padding: 14px 48px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(196, 163, 90, 0.3);
            margin-top: 16px;
        }

        .btn-cast:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(196, 163, 90, 0.4);
        }

        .btn-cast:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 爻象显示区 */
        .yao-display {
            margin: 24px 0;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
            min-height: 140px;
        }

        .yao-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 12px 0;
            opacity: 0;
            transform: translateX(-20px);
            animation: slideIn 0.4s ease forwards;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .yao-symbol {
            font-size: 2rem;
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 4px;
        }

        .yao-number {
            font-size: 0.85rem;
            color: var(--text-secondary);
            min-width: 50px;
        }

        .yao-line {
            width: 60px;
            height: 6px;
            border-radius: 3px;
        }

        .yao-line.yang {
            background: var(--bagua-yang);
        }

        .yao-line.yin {
            background: transparent;
            border: 2px solid var(--bagua-yang);
            height: 6px;
            position: relative;
        }

        .yao-line.yin::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 2px;
            background: var(--bagua-yang);
        }

        /* 卦象结果 */
        .gua-result {
            margin-top: 24px;
            padding: 24px;
            background: linear-gradient(135deg, rgba(196, 163, 90, 0.1) 0%, rgba(139, 115, 85, 0.1) 100%);
            border-radius: 12px;
            border: 1px solid rgba(196, 163, 90, 0.3);
        }

        .gua-name {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }

        .gua-meaning {
            text-align: center;
            color: var(--accent-dark);
            font-size: 1rem;
            margin-bottom: 16px;
        }

        .gua-ci {
            font-family: 'Noto Serif SC', serif;
            font-size: 0.95rem;
            line-height: 1.8;
            text-align: center;
            color: var(--text-secondary);
            padding: 16px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .gua-symbols {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 20px 0;
        }

        .gua-symbol-item {
            text-align: center;
        }

        .gua-symbol-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .gua-symbol-value {
            font-size: 2.5rem;
            letter-spacing: 8px;
        }

        /* AI分析区 */
        .ai-analysis {
            text-align: center;
        }

        .btn-ai {
            background: linear-gradient(135deg, #4a4a4a 0%, #2c2c2c 100%);
            color: #fff;
            border: none;
            padding: 14px 40px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(44, 44, 44, 0.3);
        }

        .btn-ai:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(44, 44, 44, 0.4);
        }

        .btn-ai:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-reset {
            background: transparent;
            color: var(--accent-dark);
            border: 1px solid var(--accent-dark);
            padding: 12px 32px;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.95rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-reset:hover {
            background: var(--accent-dark);
            color: #fff;
        }

        .ai-loading {
            display: none;
            margin-top: 24px;
        }

        .ai-loading.active {
            display: block;
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .loading-dot {
            width: 10px;
            height: 10px;
            background: var(--accent-gold);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .ai-result {
            display: none;
            margin-top: 24px;
            text-align: left;
            padding: 24px;
            background: linear-gradient(135deg, rgba(74, 74, 74, 0.05) 0%, rgba(44, 44, 44, 0.08) 100%);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .ai-result.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-result h4 {
            font-family: 'Noto Serif SC', serif;
            color: var(--accent-dark);
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .ai-result p {
            line-height: 1.9;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* 底部装饰 */
        .footer-decoration {
            text-align: center;
            padding: 40px 0 20px;
            opacity: 0.6;
        }

        .footer-decoration svg {
            width: 60px;
            height: 60px;
        }

        /* 隐藏状态 */
        .hidden {
            display: none !important;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .container {
                padding: 12px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .card {
                padding: 20px;
                border-radius: 12px;
            }

            .coin {
                width: 60px;
                height: 60px;
            }

            .coins-container {
                gap: 16px;
            }

            .gua-symbols {
                flex-direction: column;
                gap: 16px;
            }

            .btn-cast, .btn-ai {
                padding: 12px 32px;
                font-size: 1rem;
            }
        }

        /* 变爻提示 */
        .bian-yao-hint {
            text-align: center;
            padding: 12px;
            background: rgba(196, 163, 90, 0.1);
            border-radius: 8px;
            margin: 16px 0;
            font-size: 0.9rem;
            color: var(--accent-dark);
        }

        /* 卦爻辞展示 */
        .yao-text-container {
            margin-top: 16px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
        }

        .yao-text-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 0.95rem;
            color: var(--accent-dark);
            text-align: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .yao-text-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .yao-text-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-secondary);
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .yao-text-item:hover {
            background: rgba(196, 163, 90, 0.08);
        }

        .yao-text-item.dynamic {
            background: rgba(196, 163, 90, 0.12);
            color: var(--accent-dark);
        }

        .yao-text-item .yao-label {
            font-weight: 600;
            min-width: 42px;
            color: var(--text-primary);
        }

        .yao-text-item .dynamic-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--accent-gold);
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="ink-bg"></div>
    
    <div class="container">
        <!-- 头部 -->
        <header>
            <div class="logo">
                <svg class="taiji-symbol" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="48" fill="none" stroke="#2c2c2c" stroke-width="2"/>
                    <path d="M50 2 A48 48 0 0 1 50 98 A24 24 0 0 1 50 50 A24 24 0 0 0 50 2" fill="#2c2c2c"/>
                    <circle cx="50" cy="26" r="6" fill="#2c2c2c"/>
                    <circle cx="50" cy="74" r="6" fill="#fff"/>
                </svg>
                <h1>易占AI·铜钱沙盘</h1>
            </div>
            <p class="subtitle">辅助决策 · 洞察先机</p>
        </header>

        <!-- 问题输入区 -->
        <div class="card question-area">
            <div class="card-title">心有所惑</div>
            <textarea class="question-input" id="questionInput" placeholder="请输入您想咨询的决策问题&#10;例如：我该跳槽吗？该选A公司还是B公司？&#10;亦或是：这段感情该如何抉择？"></textarea>
        </div>

        <!-- 掷卦互动区 -->
        <div class="card casting-area">
            <div class="card-title">投石问路</div>
            
            <div class="coins-container" id="coinsContainer">
                <div class="coin-wrapper">
                    <div class="coin" id="coin1">
                        <div class="coin-face coin-front">☰</div>
                        <div class="coin-face coin-back">☷</div>
                    </div>
                </div>
                <div class="coin-wrapper">
                    <div class="coin" id="coin2">
                        <div class="coin-face coin-front">☰</div>
                        <div class="coin-face coin-back">☷</div>
                    </div>
                </div>
                <div class="coin-wrapper">
                    <div class="coin" id="coin3">
                        <div class="coin-face coin-front">☰</div>
                        <div class="coin-face coin-back">☷</div>
                    </div>
                </div>
            </div>

            <div class="progress-indicator">
                <span id="progressText">尚未起卦</span>
            </div>
            <div class="progress-dots" id="progressDots">
                <div class="progress-dot" data-index="0"></div>
                <div class="progress-dot" data-index="1"></div>
                <div class="progress-dot" data-index="2"></div>
                <div class="progress-dot" data-index="3"></div>
                <div class="progress-dot" data-index="4"></div>
                <div class="progress-dot" data-index="5"></div>
            </div>

            <button class="btn-cast" id="btnCast">掷铜钱</button>
        </div>

        <!-- 爻象显示区 -->
        <div class="card hidden" id="yaoDisplay">
            <div class="card-title">卦象初现</div>
            <div class="yao-display" id="yaoDisplayInner"></div>
        </div>

        <!-- 卦象结果 -->
        <div class="card hidden" id="guaResult">
            <div class="card-title">卦辞详解</div>
            <div class="gua-result">
                <div class="gua-name" id="guaName"></div>
                <div class="gua-meaning" id="guaMeaning"></div>
                <div class="gua-ci" id="guaCi"></div>
                
                <div class="gua-symbols">
                    <div class="gua-symbol-item">
                        <div class="gua-symbol-label">本卦</div>
                        <div class="gua-symbol-value" id="benGuaSymbol"></div>
                    </div>
                    <div class="gua-symbol-item">
                        <div class="gua-symbol-label">变卦</div>
                        <div class="gua-symbol-value" id="bianGuaSymbol"></div>
                    </div>
                </div>

                <div class="bian-yao-hint" id="bianYaoHint"></div>

                <div class="yao-text-container" id="yaoTextContainer">
                    <div class="yao-text-title">卦爻辞</div>
                    <div class="yao-text-list" id="yaoTextList"></div>
                </div>
            </div>
        </div>

        <!-- AI分析区 -->
        <div class="card ai-analysis hidden" id="aiSection">
            <div class="card-title">AI智慧解读</div>
            <button class="btn-ai" id="btnAI">✨ AI分析解读</button>
            
            <div class="ai-loading" id="aiLoading">
                <div class="loading-dots">
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                </div>
                <p>易道玄机，正在解读...</p>
            </div>

            <div class="ai-result" id="aiResult">
                <h4>📜 AI分析</h4>
                <p id="aiResultText"></p>
            </div>

            <button class="btn-reset" id="btnReset">🔄 重新占卜</button>
        </div>

        <!-- 底部装饰 -->
        <div class="footer-decoration">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#d4c9b8" stroke-width="1"/>
                <circle cx="50" cy="50" r="35" fill="none" stroke="#d4c9b8" stroke-width="1"/>
                <circle cx="50" cy="50" r="25" fill="none" stroke="#d4c9b8" stroke-width="1"/>
                <circle cx="50" cy="50" r="15" fill="none" stroke="#d4c9b8" stroke-width="1"/>
            </svg>
        </div>
    </div>

    <script>
        // 64卦数据库（yao从下到上：yao[0]=初爻, yao[5]=上爻；guaXiang先上卦再下卦）
        const hexagramData = {
            "乾": { name: "乾", meaning: "元亨利贞", guaCi: "天行健，君子以自强不息。", yao: [1,1,1,1,1,1], guaXiang: "☰☰", change: "乾为天", bian: "乾", yaoText: ["潜龙勿用","见龙在田，利见大人","君子终日乾乾，夕惕若厉，无咎","或跃在渊，无咎","飞龙在天，利见大人","亢龙有悔"] },
            "坤": { name: "坤", meaning: "元亨，利牝马之贞", guaCi: "地势坤，君子以厚德载物。", yao: [0,0,0,0,0,0], guaXiang: "☷☷", change: "坤为地", bian: "坤", yaoText: ["履霜，坚冰至","直方大，不习无不利","含章可贞，或从王事，无成有终","括囊，无咎无誉","黄裳，元吉","龙战于野，其血玄黄"] },
            "屯": { name: "屯", meaning: "元亨利贞，勿用有攸往", guaCi: "云雷屯，君子以经纶。", yao: [1,0,0,0,1,0], guaXiang: "☵☳", change: "水雷屯", bian: "屯", yaoText: ["磐桓，利居贞，利建侯","屯如邅如，乘马班如，匪寇婚媾，女子贞不字，十年乃字","即鹿无虞，惟入于林中，君子几不如舍，往吝","乘马班如，求婚媾，往吉无不利","屯其膏，小贞吉，大贞凶","乘马班如，泣血涟如"] },
            "蒙": { name: "蒙", meaning: "亨。匪我求童蒙，童蒙求我", guaCi: "山下出泉，蒙；君子以果行育德。", yao: [0,1,0,0,0,1], guaXiang: "☶☵", change: "山水蒙", bian: "蒙", yaoText: ["发蒙，利用刑人，用说桎梏，以往吝","包蒙吉，纳妇吉，子克家","勿用取女，见金夫，不有躬，无攸利","困蒙，吝","童蒙，吉","击蒙，不利为寇，利御寇"] },
            "需": { name: "需", meaning: "有孚，光亨，贞吉", guaCi: "云上于天，需；君子以饮食宴乐。", yao: [1,1,1,0,1,0], guaXiang: "☵☰", change: "水天需", bian: "需", yaoText: ["需于郊，利用恒，无咎","需于沙，小有言，终吉","需于泥，致寇至","需于血，出自穴","需于酒食，贞吉","入于穴，有不速之客三人来，敬之终吉"] },
            "讼": { name: "讼", meaning: "有孚，窒惕，中吉，终凶", guaCi: "天与水违行，讼；君子以作事谋始。", yao: [0,1,0,1,1,1], guaXiang: "☰☵", change: "天水讼", bian: "讼", yaoText: ["不永所事，小有言，终吉","不克讼，归逋其邑人三百户，无眚","食旧德，贞厉，终吉，或从王事无成","不克讼，复即命渝，安贞吉","讼元吉","或锡之鞶带，终朝三褫之"] },
            "师": { name: "师", meaning: "贞，丈人，吉无咎", guaCi: "地中有水，师；君子以容民畜众。", yao: [0,1,0,0,0,0], guaXiang: "☷☵", change: "地水师", bian: "师", yaoText: ["师出以律，否臧凶","在师中吉，无咎，王三锡命","师或舆尸，凶","师左次，无咎","田有禽，利执言，无咎，长子帅师，弟子舆尸，贞凶","大君有命，开国承家，小人勿用"] },
            "比": { name: "比", meaning: "吉。原筮，元永贞，无咎", guaCi: "地上有水，比；先王以建万国，亲诸侯。", yao: [0,0,0,0,1,0], guaXiang: "☵☷", change: "水地比", bian: "比", yaoText: ["有孚比之，无咎，有孚盈缶，终来有它吉","比之自内，贞吉","比之匪人","外比之，贞吉","显比，王用三驱，失前禽，邑人不诫，吉","比之无首，凶"] },
            "小畜": { name: "小畜", meaning: "亨，密云不雨，自我西郊", guaCi: "风行天上，小畜；君子以懿文德。", yao: [1,1,1,0,1,1], guaXiang: "☴☰", change: "风天小畜", bian: "小畜", yaoText: ["复自道，何其咎，吉","牵复，吉","舆说辐，夫妻反目","有孚，血去惕出，无咎","有孚挛如，富以其邻","既雨既处，尚德载，妇贞厉，月几望，君子征凶"] },
            "履": { name: "履", meaning: "履虎尾，不咥人，亨", guaCi: "上天下泽，履；君子以辨上下，定民志。", yao: [1,1,0,1,1,1], guaXiang: "☰☱", change: "天泽履", bian: "履", yaoText: ["素履往，无咎","履道坦坦，幽人贞吉","眇能视，跛能履，履虎尾，咥人凶，武人为于大君","履虎尾，愬愬终吉","夬履，贞厉","视履考祥，其旋元吉"] },
            "泰": { name: "泰", meaning: "小往大来，吉亨", guaCi: "天地交，泰；后以财成天地之道。", yao: [1,1,1,0,0,0], guaXiang: "☷☰", change: "地天泰", bian: "泰", yaoText: ["拔茅茹以其汇，征吉","包荒，用冯河，不遐遗，朋亡，得尚于中行","无平不陂，无往不复，艰贞无咎，勿恤其孚，于食有福","翩翩不富以其邻，不戒以孚","帝乙归妹以祉，元吉","城复于隍，勿用师，自邑告命，贞吝"] },
            "否": { name: "否", meaning: "否之匪人，不利君子贞，大往小来", guaCi: "天地不交，否；君子以俭德辟难。", yao: [0,0,0,1,1,1], guaXiang: "☰☷", change: "天地否", bian: "否", yaoText: ["拔茅茹以其汇，贞吉亨","包承，小人吉，大人否亨","包羞","有命无咎，畴离祉","休否，大人吉，其亡其亡，系于苞桑","倾否，先否后喜"] },
            "同人": { name: "同人", meaning: "同人于野，亨，利涉大川，利君子贞", guaCi: "天与火，同人；君子以类族辨物。", yao: [1,0,1,1,1,1], guaXiang: "☰☲", change: "天火同人", bian: "同人", yaoText: ["同人于门，无咎","同人于宗，吝","伏戎于莽，升其高陵，三岁不兴","乘其墉，弗克攻，吉","同人先号咷而后笑，大师克相遇","同人于郊，无悔"] },
            "大有": { name: "大有", meaning: "元亨", guaCi: "火在天上，大有；君子以遏恶扬善。", yao: [1,1,1,1,0,1], guaXiang: "☲☰", change: "火天大有", bian: "大有", yaoText: ["无交害，匪咎，艰则无咎","大车以载，有攸往，无咎","公用亨于天子，小人弗克","匪其彭，无咎","厥孚交如威如，吉","自天佑之，吉无不利"] },
            "谦": { name: "谦", meaning: "亨，君子有终", guaCi: "地中有山，谦；君子以裒多益寡。", yao: [0,0,1,0,0,0], guaXiang: "☷☶", change: "地山谦", bian: "谦", yaoText: ["谦谦君子，用涉大川，吉","鸣谦，贞吉","劳谦君子，有终吉","无不利，撝谦","不富以其邻，利用侵伐，无不利","鸣谦，利用行师征邑国"] },
            "豫": { name: "豫", meaning: "利建侯行师", guaCi: "雷出地奋，豫；先王以作乐崇德。", yao: [0,0,0,1,0,0], guaXiang: "☳☷", change: "雷地豫", bian: "豫", yaoText: ["鸣豫，凶","介于石，不终日，贞吉","盱豫悔，迟有悔","由豫，大有得，勿疑朋盍簪","贞疾，恒不死","冥豫，成有渝无咎"] },
            "随": { name: "随", meaning: "元亨利贞，无咎", guaCi: "泽中有雷，随；君子以向晦入宴息。", yao: [1,0,0,1,1,0], guaXiang: "☱☳", change: "泽雷随", bian: "随", yaoText: ["官有渝，贞吉，出门交有功","系小子，失丈夫","系丈夫，失小子，随有求得，利居贞","随有获，贞凶，有孚在道以明，何咎","孚于嘉，吉","拘系之，乃从维之，王用亨于西山"] },
            "蛊": { name: "蛊", meaning: "元亨，利涉大川", guaCi: "山下有风，蛊；君子以振民育德。", yao: [0,1,1,0,0,1], guaXiang: "☶☴", change: "山风蛊", bian: "蛊", yaoText: ["干父之蛊，有子考无咎，厉终吉","干母之蛊，不可贞","干父之蛊，小有悔，无大咎","裕父之蛊，往见吝","干父之蛊，用誉","不事王侯，高尚其事"] },
            "临": { name: "临", meaning: "元亨利贞，至于八月有凶", guaCi: "泽上有地，临；君子以教思无穷。", yao: [1,1,0,0,0,0], guaXiang: "☷☱", change: "地泽临", bian: "临", yaoText: ["咸临，贞吉","咸临，吉无不利","甘临，无攸利，既忧之，无咎","至临，无咎","知临，大君之宜，吉","敦临，吉无咎"] },
            "观": { name: "观", meaning: "盥而不荐，有孚颙若", guaCi: "风行地上，观；先王以省方观民设教。", yao: [0,0,0,0,1,1], guaXiang: "☴☷", change: "风地观", bian: "观", yaoText: ["童观，小人无咎，君子吝","窥观，利女贞","观我生进退","观国之光，利用宾于王","观我生，君子无咎","观其生，君子无咎"] },
            "噬嗑": { name: "噬嗑", meaning: "亨，利用狱", guaCi: "雷电，噬嗑；先王以明罚敕法。", yao: [1,0,0,1,0,1], guaXiang: "☲☳", change: "火雷噬嗑", bian: "噬嗑", yaoText: ["屦校灭趾，无咎","噬肤灭鼻，无咎","噬腊肉遇毒，小吝无咎","噬干胏得金矢，利艰贞吉","噬干肉得黄金，贞厉无咎","何校灭耳，凶"] },
            "贲": { name: "贲", meaning: "亨，小利有攸往", guaCi: "山下有火，贲；君子以明庶政，无敢折狱。", yao: [1,0,1,0,0,1], guaXiang: "☶☲", change: "山火贲", bian: "贲", yaoText: ["贲其趾，舍车而徒","贲其须","贲如濡如，永贞吉","贲如皤如，白马翰如，匪寇婚媾","贲于丘园，束帛戋戋，吝终吉","白贲，无咎"] },
            "剥": { name: "剥", meaning: "不利有攸往", guaCi: "山附于地，剥；上以厚下安宅。", yao: [0,0,0,0,0,1], guaXiang: "☶☷", change: "山地剥", bian: "剥", yaoText: ["剥床以足，蔑贞凶","剥床以辨，蔑贞凶","剥之无咎","剥床以肤，凶","贯鱼以宫人宠，无不利","硕果不食，君子得舆，小人剥庐"] },
            "复": { name: "复", meaning: "亨，出入无疾，朋来无咎", guaCi: "雷在地中，复；先王以至日闭关。", yao: [1,0,0,0,0,0], guaXiang: "☷☳", change: "地雷复", bian: "复", yaoText: ["不远复，无祗悔，元吉","休复，吉","频复厉无咎","中行独复","敦复无悔","迷复凶，有灾眚，用行师终有大败，以其国君凶，至于十年不克征"] },
            "无妄": { name: "无妄", meaning: "元亨利贞，其匪正有眚", guaCi: "天下雷行，物与无妄；先王以茂对时育万物。", yao: [1,0,0,1,1,1], guaXiang: "☰☳", change: "天雷无妄", bian: "无妄", yaoText: ["无妄往，吉","不耕获，不菑畲，则利有攸往","无妄之灾，或系之牛，行人之得，邑人之灾","可贞无咎","无妄之疾，勿药有喜","无妄行，有眚，无攸利"] },
            "大畜": { name: "大畜", meaning: "利贞，不家食吉，利涉大川", guaCi: "天在山中，大畜；君子以多识前言往行。", yao: [1,1,1,0,0,1], guaXiang: "☶☰", change: "山天大畜", bian: "大畜", yaoText: ["有厉利已","舆说辐","良马逐，利艰贞，曰闲舆卫，利有攸往","童牛之牿，元吉","豶豕之牙，吉","何天之衢，亨"] },
            "颐": { name: "颐", meaning: "贞吉，观颐，自求口实", guaCi: "山下有雷，颐；君子以慎言语，节饮食。", yao: [1,0,0,0,0,1], guaXiang: "☶☳", change: "山雷颐", bian: "颐", yaoText: ["舍尔灵龟，观我朵颐，凶","颠颐，拂经于丘颐，征凶","拂颐，贞凶，十年勿用，无攸利","颠颐吉，虎视眈眈，其欲逐逐，无咎","拂经，居贞吉，不可涉大川","由颐，厉吉，利涉大川"] },
            "大过": { name: "大过", meaning: "栋桡，利有攸往，亨", guaCi: "泽灭木，大过；君子以独立不惧，遁世无闷。", yao: [0,1,1,1,1,0], guaXiang: "☱☴", change: "泽风大过", bian: "大过", yaoText: ["藉用白茅，无咎","枯杨生稊，老夫得其女妻，无不利","栋桡，凶","栋隆，吉，有它吝","枯杨生华，老妇得其士夫，无咎无誉","过涉灭顶，凶无咎"] },
            "坎": { name: "坎", meaning: "有孚，维心亨，行有尚", guaCi: "水洊至，习坎；君子以常德行，习教事。", yao: [0,1,0,0,1,0], guaXiang: "☵☵", change: "坎为水", bian: "坎", yaoText: ["习坎，入于坎窞，凶","坎有险，求小得","来之坎坎，险且枕，入于坎窞，勿用","樽酒簋贰，用缶，纳约自牖，终无咎","坎不盈，祗既平，无咎","系用徽纆，寘于丛棘，三岁不得，凶"] },
            "离": { name: "离", meaning: "利贞，亨，畜牝牛吉", guaCi: "明两作，离；大人以继明照于四方。", yao: [1,0,1,1,0,1], guaXiang: "☲☲", change: "离为火", bian: "离", yaoText: ["履错然，敬之无咎","黄离，元吉","日昃之离，不鼓缶而歌，则大耋之嗟，凶","突如其来如，焚如死如弃如","出涕沱若，戚嗟若，吉","王用出征，有嘉折首，获匪其丑，无咎"] },
            "咸": { name: "咸", meaning: "亨，利贞，取女吉", guaCi: "山上有泽，咸；君子以虚受人。", yao: [0,0,1,1,1,0], guaXiang: "☱☶", change: "泽山咸", bian: "咸", yaoText: ["咸其拇","咸其腓，凶，居吉","咸其股，执其随，往吝","贞吉悔亡，憧憧往来，朋从尔思","咸其脢，无悔","咸其辅颊舌"] },
            "恒": { name: "恒", meaning: "亨，无咎，利贞，利有攸往", guaCi: "雷风，恒；君子以立不易方。", yao: [0,1,1,1,0,0], guaXiang: "☳☴", change: "雷风恒", bian: "恒", yaoText: ["浚恒，贞凶，无攸利","悔亡","不恒其德，或承之羞，贞吝","田无禽","恒其德贞，妇人吉，夫子凶","振恒，凶"] },
            "遁": { name: "遁", meaning: "亨，小利贞", guaCi: "天下有山，遁；君子以远小人，不恶而严。", yao: [0,0,1,1,1,1], guaXiang: "☰☶", change: "天山遁", bian: "遁", yaoText: ["遁尾厉，勿用有攸往","执之用黄牛之革，莫之胜说","系遁，有疾厉，畜臣妾吉","好遁，君子吉，小人否","嘉遁，贞吉","肥遁，无不利"] },
            "大壮": { name: "大壮", meaning: "利贞", guaCi: "雷在天上，大壮；君子以非礼弗履。", yao: [1,1,1,1,0,0], guaXiang: "☳☰", change: "雷天大壮", bian: "大壮", yaoText: ["壮于趾，征凶，有孚","贞吉","小人用壮，君子用罔，贞厉，羝羊触藩，羸其角","贞吉悔亡，藩决不羸，壮于大舆之輹","丧羊于易，无悔","羝羊触藩，不能退不能遂，无攸利，艰则吉"] },
            "晋": { name: "晋", meaning: "康侯用锡马蕃庶，昼日三接", guaCi: "明出地上，晋；君子以自昭明德。", yao: [0,0,0,1,0,1], guaXiang: "☲☷", change: "火地晋", bian: "晋", yaoText: ["晋如摧如，贞吉，罔孚裕无咎","晋如愁如，贞吉，受兹介福于其王母","众允悔亡","晋如鼫鼠，贞厉","悔亡，失得勿恤，往吉无不利","晋其角，维用伐邑，厉吉无咎，贞吝"] },
            "明夷": { name: "明夷", meaning: "利艰贞", guaCi: "明入地中，明夷；君子以莅众，用晦而明。", yao: [1,0,1,0,0,0], guaXiang: "☷☲", change: "地火明夷", bian: "明夷", yaoText: ["明夷于飞，垂其翼，君子于行，三日不食，有攸往，主人有言","明夷夷于左股，用拯马壮吉","明夷于南狩，得其大首，不可疾贞","入于左腹，获明夷之心，于出门庭","箕子之明夷，利贞","不明晦，初登于天，后入于地"] },
            "家人": { name: "家人", meaning: "利女贞", guaCi: "风自火出，家人；君子以言有物而行有恒。", yao: [1,0,1,0,1,1], guaXiang: "☴☲", change: "风火家人", bian: "家人", yaoText: ["闲有家，悔亡","无攸遂，在中馈，贞吉","家人嗃嗃，悔厉吉，妇子嘻嘻，终吝","富家，大吉","王假有家，勿恤吉","有孚威如，终吉"] },
            "睽": { name: "睽", meaning: "小事吉", guaCi: "上火下泽，睽；君子以同而异。", yao: [1,1,0,1,0,1], guaXiang: "☲☱", change: "火泽睽", bian: "睽", yaoText: ["悔亡，丧马勿逐自复，见恶人无咎","遇主于巷，无咎","见舆曳，其牛掣，其人天且劓，无初有终","睽孤遇元夫，交孚厉无咎","悔亡，厥宗噬肤，往何咎","睽孤见豕负涂，载鬼一车，先张之弧后说之弧，匪寇婚媾，往遇雨则吉"] },
            "蹇": { name: "蹇", meaning: "利西南，不利东北；利见大人，贞吉", guaCi: "山上有水，蹇；君子以反身修德。", yao: [0,0,1,0,1,0], guaXiang: "☵☶", change: "水山蹇", bian: "蹇", yaoText: ["往蹇来誉","王臣蹇蹇，匪躬之故","往蹇来反","往蹇来连","大蹇朋来","往蹇来硕，吉，利见大人"] },

            "既济": { name: "既济", meaning: "亨小，利贞，初吉终乱", guaCi: "水在火上，既济；君子以思患而豫防之。", yao: [1,0,1,0,1,0], guaXiang: "☵☲", change: "水火既济", bian: "既济", yaoText: ["曳其轮，濡其尾，无咎","妇丧其茀，勿逐七日得","高宗伐鬼方，三年克之，小人勿用","繻有衣袽，终日戒","东邻杀牛，不如西邻之禴祭，实受其福","濡其首，厉"] },
            "未济": { name: "未济", meaning: "亨，小狐汔济，濡其尾，无攸利", guaCi: "火在水上，未济；君子以慎辨物居方。", yao: [0,1,0,1,0,1], guaXiang: "☲☵", change: "火水未济", bian: "未济", yaoText: ["濡其尾，吝","曳其轮，贞吉","未济征凶，利涉大川","贞吉悔亡，震用伐鬼方，三年有赏于大国","贞吉无悔，君子之光有孚吉","有孚于饮酒无咎，濡其首，有孚失是"] }

        // 卦象符号映射（value从下到上）
        const trigramSymbols = {
            "☰": { name: "乾", value: [1,1,1] },
            "☱": { name: "兑", value: [1,1,0] },
            "☲": { name: "离", value: [1,0,1] },
            "☳": { name: "震", value: [1,0,0] },
            "☴": { name: "巽", value: [0,1,1] },
            "☵": { name: "坎", value: [0,1,0] },
            "☶": { name: "艮", value: [0,0,1] },
            "☷": { name: "坤", value: [0,0,0] }
        };

        // 状态变量
        let currentYao = [];
        let dynamicFlags = [];  // 记录每爻是否为动爻（老阳/老阴）
        let currentGua = null;
        let isCasting = false;
        let castCount = 0;

        // DOM元素
        const btnCast = document.getElementById('btnCast');
        const btnAI = document.getElementById('btnAI');
        const btnReset = document.getElementById('btnReset');
        const questionInput = document.getElementById('questionInput');
        const coinsContainer = document.getElementById('coinsContainer');
        const progressText = document.getElementById('progressText');
        const progressDots = document.querySelectorAll('.progress-dot');
        const yaoDisplay = document.getElementById('yaoDisplay');
        const yaoDisplayInner = document.getElementById('yaoDisplayInner');
        const guaResult = document.getElementById('guaResult');
        const aiSection = document.getElementById('aiSection');
        const aiLoading = document.getElementById('aiLoading');
        const aiResult = document.getElementById('aiResult');
        const aiResultText = document.getElementById('aiResultText');

        // 掷铜钱逻辑
        function castCoins() {
            if (isCasting) return;
            isCasting = true;
            
            const coins = [
                document.getElementById('coin1'),
                document.getElementById('coin2'),
                document.getElementById('coin3')
            ];

            // 重置铜钱
            coins.forEach(coin => {
                coin.classList.remove('flipping');
                coin.style.transform = 'rotateY(0deg)';
            });

            // 触发翻转动画
            setTimeout(() => {
                coins.forEach(coin => coin.classList.add('flipping'));
            }, 50);

            // 计算结果
            setTimeout(() => {
                const results = [];
                for (let i = 0; i < 3; i++) {
                    results.push(Math.random() > 0.5 ? 1 : 0);
                }
                
                // 3正为阳爻，2正1反为阴爻
                const yangCount = results.filter(r => r === 1).length;
                const yaoValue = yangCount >= 2 ? 1 : 0;  // 2阳1阴=少阳, 3阳=老阳, 1阳2阴=少阴, 0阳=老阴
                const isDynamic = (yangCount === 3 || yangCount === 0);  // 老阳或老阴=动爻
                
                // 更新铜钱显示
                coins.forEach((coin, i) => {
                    if (results[i] === 1) {
                        coin.querySelector('.coin-front').textContent = '☰';
                        coin.querySelector('.coin-back').textContent = '☷';
                    } else {
                        coin.querySelector('.coin-front').textContent = '☷';
                        coin.querySelector('.coin-back').textContent = '☰';
                    }
                });

                currentYao.push(yaoValue);
                dynamicFlags.push(isDynamic);
                castCount++;
                
                updateProgress();
                displayYao(yaoValue);
                
                if (castCount < 6) {
                    isCasting = false;
                } else {
                    finishCasting();
                }
            }, 800);
        }

        // 更新进度
        function updateProgress() {
            progressText.textContent = `第 ${castCount} 爻`;
            
            progressDots.forEach((dot, i) => {
                dot.classList.remove('active', 'yang', 'yin');
                if (i < castCount) {
                    dot.classList.add('active');
                    if (currentYao[i] === 1) {
                        dot.classList.add('yang');
                    } else {
                        dot.classList.add('yin');
                    }
                }
            });
        }

        // 显示爻
        function displayYao(yaoValue) {
            yaoDisplay.classList.remove('hidden');
            
            const yaoDiv = document.createElement('div');
            yaoDiv.className = 'yao-row';
            yaoDiv.style.animationDelay = `${(castCount - 1) * 0.15}s`;
            
            const lineClass = yaoValue === 1 ? 'yang' : 'yin';
            const symbol = yaoValue === 1 ? '—' : '— —';
            const chineseNum = ['初', '二', '三', '四', '五', '上'][castCount - 1];
            const isDyn = dynamicFlags[castCount - 1];
            const dynMark = isDyn ? ' ○' : '';  // 动爻标记○
            const yaoType = isDyn ? (yaoValue === 1 ? '老阳' : '老阴') : (yaoValue === 1 ? '少阳' : '少阴');
            
            yaoDiv.innerHTML = `
                <span class="yao-number">${chineseNum}</span>
                <span class="yao-line ${lineClass}" ${isDyn ? 'style="box-shadow:0 0 6px rgba(220,120,40,0.7);"' : ''}></span>
                <span class="yao-symbol">${symbol}${dynMark}</span>
                <span style="font-size:0.7em;color:#c87830;margin-left:4px;">${isDyn ? yaoType : ''}</span>
            `;
            
            yaoDisplayInner.appendChild(yaoDiv);
        }

        // 完成掷卦
        function finishCasting() {
            btnCast.disabled = true;
            progressText.textContent = '卦成';
            
            // 查找对应卦象
            currentGua = findGua(currentYao);
            
            // 兜底：如果数据库里没找到，根据上下卦自动生成
            if (!currentGua) {
                const lowerName = getTrigramNameByYao(currentYao.slice(0, 3));
                const upperName = getTrigramNameByYao(currentYao.slice(3, 6));
                const lowerSymbol = getTrigram(currentYao.slice(0, 3));
                const upperSymbol = getTrigram(currentYao.slice(3, 6));
                currentGua = {
                    name: upperName + lowerName,
                    meaning: '阴阳交变，万象更新',
                    guaCi: upperName + '上' + lowerName + '下，阴阳交错，变化万千，当审时度势而行。',
                    guaXiang: upperSymbol + lowerSymbol
                };
            }
            
            displayGuaResult();
            aiSection.classList.remove('hidden');
        }

        // 根据爻象获取三卦名称
        function getTrigramNameByYao(yao) {
            const key = yao.join('');
            const nameMap = {
                '111': '乾', '110': '兑', '101': '离', '100': '震',
                '011': '巽', '010': '坎', '001': '艮', '000': '坤'
            };
            return nameMap[key] || '未知';
        }

        // 查找卦象
        function findGua(yao) {
            // 遍历64卦查找匹配
            for (const key in hexagramData) {
                const g = hexagramData[key];
                let match = true;
                for (let i = 0; i < 6; i++) {
                    if (g.yao[i] !== yao[i]) {
                        match = false;
                        break;
                    }
                }
                if (match) return g;
            }
            return null;
        }

        // 显示卦结果
        function displayGuaResult() {
            guaResult.classList.remove('hidden');
            
            document.getElementById('guaName').textContent = currentGua.name + '卦';
            document.getElementById('guaMeaning').textContent = currentGua.meaning;
            document.getElementById('guaCi').textContent = '《彖》曰：' + currentGua.guaCi;
            
            // 显示卦象符号
            const lowerTrigram = getTrigram(currentYao.slice(0, 3));
            const upperTrigram = getTrigram(currentYao.slice(3, 6));
            document.getElementById('benGuaSymbol').textContent = upperTrigram + lowerTrigram;
            
            // 变卦（只有动爻变：老阳→阴，老阴→阳）
            const dongPositions = getDongYaoPosition();
            const bianKey = findBianGua();
            if (bianKey !== -1) {
                const bianGua = hexagramData[bianKey];
                document.getElementById('bianGuaSymbol').textContent = bianGua.guaXiang || (upperTrigram + lowerTrigram);
            } else {
                // 无动爻时，变卦=本卦
                document.getElementById('bianGuaSymbol').textContent = upperTrigram + lowerTrigram;
            }
            
            // 显示变爻信息
            document.getElementById('bianYaoHint').textContent = `动爻：${dongPositions}`;
            
            // 显示卦爻辞
            displayYaoText();
        }
        
        // 显示卦爻辞
        function displayYaoText() {
            const yaoTextList = document.getElementById('yaoTextList');
            yaoTextList.innerHTML = '';
            
            const yaoNames = ['初', '二', '三', '四', '五', '上'];
            
            if (currentGua && currentGua.yaoText) {
                for (let i = 0; i < 6; i++) {
                    const yaoValue = currentYao[i];
                    // 阳爻用"九"，阴爻用"六"
                    const yaoNum = yaoValue === 1 ? '九' : '六';
                    // 初爻和上爻特殊：初九/初六，上九/上六
                    let label;
                    if (i === 0) {
                        label = '初' + yaoNum;
                    } else if (i === 5) {
                        label = '上' + yaoNum;
                    } else {
                        label = yaoNum + yaoNames[i];
                    }
                    
                    const isDynamic = dynamicFlags[i];
                    const div = document.createElement('div');
                    div.className = 'yao-text-item' + (isDynamic ? ' dynamic' : '');
                    div.innerHTML = `
                        <span class="yao-label">${isDynamic ? '<span class="dynamic-dot"></span>' : ''}${label}</span>
                        <span>${currentGua.yaoText[i]}</span>
                    `;
                    yaoTextList.appendChild(div);
                }
            }
        }

        // 获取三爻卦
        function getTrigram(yao) {
            const key = yao.join('');
            for (const s in trigramSymbols) {
                if (trigramSymbols[s].value.join('') === key) {
                    return s;
                }
            }
            return '☷';
        }

        // 查找变卦（只有动爻才变：老阳变阴、老阴变阳）
        function findBianGua() {
            const bianYao = currentYao.map((y, i) => {
                if (dynamicFlags[i]) {
                    return y === 1 ? 0 : 1;  // 动爻取反
                }
                return y;  // 非动爻不变
            });
            return findGuaIndex(bianYao);
        }

        // 查找卦的索引
        function findGuaIndex(yao) {
            for (const key in hexagramData) {
                const g = hexagramData[key];
                let match = true;
                for (let i = 0; i < 6; i++) {
                    if (g.yao[i] !== yao[i]) {
                        match = false;
                        break;
                    }
                }
                if (match) return key;
            }
            return -1;
        }

        // 获取动爻位置（基于铜钱掷卦时的老阳/老阴）
        function getDongYaoPosition() {
            const positions = [];
            const names = ['初', '二', '三', '四', '五', '上'];
            for (let i = 0; i < 6; i++) {
                if (dynamicFlags[i]) {
                    const type = currentYao[i] === 1 ? '老阳' : '老阴';
                    positions.push(names[i] + '爻(' + type + ')');
                }
            }
            return positions.length > 0 ? positions.join('、') : '无动爻（本卦=变卦）';
        }

        // ============================================
        // 【重要】在这里填入你的通义千问 API Key
        // ============================================
        const API_KEY = 'sk-bf03be237b19431e81a5006d8522a2d1';  // ← 把这里改成你的 Key

        // AI分析
        btnAI.addEventListener('click', async function() {
            btnAI.disabled = true;
            aiLoading.classList.add('active');
            aiResult.classList.remove('active');
            
            try {
                const question = questionInput.value || '事业发展';
                const analysis = await callTongyiAI(question, currentGua);
                
                aiResultText.innerHTML = analysis;
                aiResult.classList.add('active');
            } catch (error) {
                aiResultText.innerHTML = `<b>抱歉，AI分析出错：</b><br>${error.message}<br><br>请检查网络连接或 API Key 是否正确。`;
                aiResult.classList.add('active');
            }
            
            aiLoading.classList.remove('active');
            btnAI.disabled = false;
        });

        // 调用通义千问 API
        async function callTongyiAI(question, gua) {
            const systemPrompt = `你是一位精通周易六十四卦的智者，擅长根据卦象为人们解答困惑、指引方向。
请用温和、智慧、富有哲理的语言回答，格式清晰，包含：
1. 卦象核心含义解读
2. 针对用户问题的具体分析
3. 机遇与风险提示
4. 具体可行的行动建议
回答要通俗易懂，不要过于玄奥，字数控制在300字左右。`;

            const yaoTextInfo = gua.yaoText ? gua.yaoText.map((t, i) => {
                const yaoValue = currentYao[i];
                const yaoNum = yaoValue === 1 ? '九' : '六';
                const yaoNames = ['初', '二', '三', '四', '五', '上'];
                const label = i === 0 ? '初' + yaoNum : (i === 5 ? '上' + yaoNum : yaoNum + yaoNames[i]);
                const isDyn = dynamicFlags[i] ? '【动爻】' : '';
                return label + '：' + t + isDyn;
            }).join('\n') : '';

const userPrompt = `我的问题是：${question}

我通过掷铜钱得到了【${gua.name}卦】。
卦辞曰："${gua.guaCi}"
爻辞如下：
${yaoTextInfo}

请帮我分析这个卦象对我的问题有什么启示？如有动爻，请重点解读动爻爻辞的含义。`;

            const response = await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'qwen-turbo',
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userPrompt }
                    ]
                })
            });

            if (!response.ok) {
                throw new Error(`API 请求失败（${response.status}），请检查 API Key 是否正确`);
            }

            const data = await response.json();
            return data.choices[0].message.content.replace(/\n/g, '<br>');
        }

        // 重置
        function reset() {
            currentYao = [];
            dynamicFlags = [];
            currentGua = null;
            isCasting = false;
            castCount = 0;
            
            btnCast.disabled = false;
            progressText.textContent = '尚未起卦';
            
            progressDots.forEach(dot => {
                dot.classList.remove('active', 'yang', 'yin');
            });
            
            yaoDisplay.classList.add('hidden');
            yaoDisplayInner.innerHTML = '';
            guaResult.classList.add('hidden');
            document.getElementById('yaoTextList').innerHTML = '';
            aiSection.classList.add('hidden');
            aiResult.classList.remove('active');
            aiLoading.classList.remove('active');
            questionInput.value = '';  // 清空问题输入框
            btnAI.disabled = false;    // 重置AI按钮状态
        }

        // 事件绑定
        btnCast.addEventListener('click', castCoins);
        btnReset.addEventListener('click', reset);

        // 初始化
        reset();
    </script>
</body>
</html>
